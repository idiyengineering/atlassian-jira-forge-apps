name: Deploy Atlassian Forge App

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch: # allows manual runs from the GitHub UI

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: atlassian-jira-fields-viewer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: atlassian-jira-fields-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  deploy:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: atlassian-jira-fields-viewer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: atlassian-jira-fields-viewer/package-lock.json

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Install dependencies
        run: npm ci

      - name: Deploy Forge App
        run: |
          export FORGE_EMAIL=${{ secrets.FORGE_EMAIL }}
          export FORGE_API_TOKEN=${{ secrets.FORGE_API_TOKEN }}
          forge settings set usage-analytics false

          # Determine environment based on branch
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            ENVIRONMENT="production"
          elif [ "${GITHUB_REF##*/}" = "develop" ]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="development"
          fi

          echo "Deploying to Forge environment: $ENVIRONMENT"

          forge deploy --non-interactive -e "$ENVIRONMENT"

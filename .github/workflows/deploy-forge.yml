name: Deploy Atlassian Forge App

on:
  push:
    branches: [ 'main', 'develop' ]
  pull_request:
    branches: [ 'main', 'develop' ]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: atlassian-jira-fields-viewer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: atlassian-jira-fields-viewer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: atlassian-jira-fields-viewer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: atlassian-jira-fields-viewer/package-lock.json

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Install dependencies
        run: npm ci

      - name: Deploy Forge App
        run: |
          export FORGE_EMAIL=${{ secrets.FORGE_EMAIL }}
          export FORGE_API_TOKEN=${{ secrets.FORGE_API_TOKEN }}
          forge settings set usage-analytics false

          # Determine environment based on branch
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ENVIRONMENT="development"
          elif [ "$BRANCH_NAME" = "main" ]; then
            ENVIRONMENT="production"
          elif [ "$BRANCH_NAME" = "develop" ]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="development"
          fi

          echo "Deploying to Forge environment: $ENVIRONMENT"

          ATTEMPT=1
          MAX_ATTEMPTS=4
          until forge deploy --non-interactive -e "$ENVIRONMENT"; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "Forge deploy failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            SLEEP_SECONDS=$((ATTEMPT * 20))
            echo "Forge environment appears busy. Retrying in ${SLEEP_SECONDS}s..."
            sleep "$SLEEP_SECONDS"
            ATTEMPT=$((ATTEMPT + 1))
          done
